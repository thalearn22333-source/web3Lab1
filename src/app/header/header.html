<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
      integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="flex justify-evenly items-center w-full h-25 bg-black top-0 fixed">
      <div class="logo text-white">
        <img
          src="images/logoNoBG.png"
          alt=""
          class="w-16 md:w-32 rounded animate-bounce [animation-duration:900ms] pt-20 -translate-x-10"
        />
      </div>
      <nav>
        <ul class="text-white flex gap-5 cursor-pointer text-center">
          <li
            class="hover:bg-[#EE5929] rounded min-w-20 h-8 content-center antialiased hover:scale-105 hover:translate-x-1 hover:skew-x-3 hover:font-medium duration-300 ease-in-out delay-[10] animate-bounce"
          >
            Home
          </li>
          <li
            class="hover:bg-[#EE5929] rounded min-w-20 h-8 content-center antialiased hover:scale-105 hover:translate-x-1 hover:skew-x-3 hover:font-medium duration-300 ease-in-out delay-[10] animate-bounce"
          >
            Products
          </li>
          <li
            class="hover:bg-[#EE5929] rounded min-w-20 h-8 content-center antialiased hover:scale-105 hover:translate-x-1 hover:skew-x-3 hover:font-medium duration-300 ease-in-out delay-[10] animate-bounce"
          >
            Services
          </li>
          <li
            class="hover:bg-[#EE5929] rounded min-w-20 h-8 content-center antialiased hover:scale-105 hover:translate-x-1 hover:skew-x-3 hover:font-medium duration-300 ease-in-out delay-[10] animate-bounce"
          >
            Contact me
          </li>
          <li
            class="hover:bg-[#EE5929] rounded min-w-20 h-8 content-center antialiased hover:scale-105 hover:translate-x-1 hover:skew-x-3 hover:font-medium duration-300 ease-in-out delay-[10] animate-bounce"
          >
            About me
          </li>
        </ul>
      </nav>

      <form class="bg-white border-0 animate-pulse">
        <input type="text " class="text-black placeholder-[#AE4421]" placeholder="Search" />
        <i class="fa-solid fa-magnifying-glass"></i>
      </form>
      <img
        src="images/light_mode.png"
        alt="mode_night logo"
        class="h-10 cursor-pointer hover:rotate-180 duration-75"
      />

      <img
        src="images/add_shopping_cart.png"
        alt=""
        class="h-13 animate-pulse ease-in-out translate-x-6 cursor-pointer"
      />
    </header>
  </body>
</html>
